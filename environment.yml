name: mezo-bca
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.2.0
  - torchvision
  - torchaudio
  - cpuonly  # Use this for CPU-only, or cudatoolkit=12.1 for GPU
  - numpy=1.24.0
  - scipy=1.10.0
  - pandas=2.0.0
  - matplotlib=3.7.0
  - tqdm=4.65.0
  - pyyaml=6.0
  - jupyter=1.0.0
  - pip=23.0.0
  - pip:
    - transformers>=4.35.0
    - datasets>=2.14.0
    - accelerate>=0.24.0
    - einops>=0.7.0
    - wandb>=0.15.0
    - safetensors>=0.4.0
    - pytest>=7.0.0
    - black>=23.0.0
    - flake8>=6.0.0
    - mypy>=1.0.0
    - tensorboard>=2.13.0